version: '3.8'

services:
  # Cache layer
  redis:
    image: redis:7-alpine
    networks:
      - internal

  # Databases
  event-mongo:
    image: mongo:6
    networks:
      - internal
    volumes:
      - event_mongo_data:/data/db

  ticket-mongo:
    image: mongo:6
    networks:
      - internal
    volumes:
      - ticket_mongo_data:/data/db

  # Microservices
  auth-service:
    build:
      context: ./auth-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    networks:
      - internal
    depends_on:
      - redis

  dispatcher:
    build:
      context: ./dispatcher
      dockerfile: ../Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - EVENT_SERVICE_URL=http://event-service:3000
      - TICKET_SERVICE_URL=http://ticket-service:3000
    networks:
      - internal
    depends_on:
      - redis
      - event-service
      - ticket-service

  event-service:
    build:
      context: ./event-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://event-mongo:27017/event-db
    networks:
      - internal
    depends_on:
      - event-mongo

  ticket-service:
    build:
      context: ./ticket-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://ticket-mongo:27017/ticket-db
      - EVENT_SERVICE_URL=http://event-service:3000
    networks:
      - internal
    depends_on:
      - ticket-mongo
      - event-service

  # Monitoring / UI
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - internal
    depends_on:
      - dispatcher

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - internal

  # --- Veritabanı İzleme (UI) Araçları ---
  event-mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://event-mongo:27017/event-db
      ME_CONFIG_BASICAUTH: false
    networks:
      - internal
    depends_on:
      - event-mongo

  ticket-mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://ticket-mongo:27017/ticket-db
      ME_CONFIG_BASICAUTH: false
    networks:
      - internal
    depends_on:
      - ticket-mongo

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8083:8081"
    networks:
      - internal
    depends_on:
      - redis

networks:
  internal:
    driver: bridge

volumes:
  event_mongo_data:
  ticket_mongo_data:
