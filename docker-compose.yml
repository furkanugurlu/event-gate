services:
  # ── Cache Katmanları ──────────────────────────────────────────────────────
  # Auth Service'in oturum deposu
  redis:
    image: redis:7-alpine
    networks:
      - internal

  # Dispatcher'ın token doğrulama deposu — auth-service'den tamamen izole
  dispatcher-redis:
    image: redis:7-alpine
    networks:
      - internal

  # ── Veritabanları ─────────────────────────────────────────────────────────
  event-mongo:
    image: mongo:6
    networks:
      - internal
    volumes:
      - event_mongo_data:/data/db

  ticket-mongo:
    image: mongo:6
    networks:
      - internal
    volumes:
      - ticket_mongo_data:/data/db

  notification-mongo:
    image: mongo:6
    networks:
      - internal
    volumes:
      - notification_mongo_data:/data/db

  userprofile-mongo:
    image: mongo:6
    networks:
      - internal
    volumes:
      - userprofile_mongo_data:/data/db

  # ── Mikroservisler ────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    networks:
      - internal
    depends_on:
      - redis

  dispatcher:
    build:
      context: ./dispatcher
      dockerfile: ../Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # dispatcher-redis: auth-service'den izole ayrı Redis örneği
      - REDIS_URL=redis://dispatcher-redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3000
      - EVENT_SERVICE_URL=http://event-service:3000
      - TICKET_SERVICE_URL=http://ticket-service:3000
      - NOTIFICATION_SERVICE_URL=http://notification-service:3000
      - USER_PROFILE_SERVICE_URL=http://user-profile-service:3000
    networks:
      - internal
    depends_on:
      - dispatcher-redis
      - auth-service
      - event-service
      - ticket-service
      - notification-service
      - user-profile-service

  event-service:
    build:
      context: ./event-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://event-mongo:27017/event-db
      - NOTIFICATION_SERVICE_URL=http://notification-service:3000
    networks:
      - internal
    depends_on:
      - event-mongo
      - notification-service

  ticket-service:
    build:
      context: ./ticket-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://ticket-mongo:27017/ticket-db
      - EVENT_SERVICE_URL=http://event-service:3000
      - USER_PROFILE_SERVICE_URL=http://user-profile-service:3000
      - NOTIFICATION_SERVICE_URL=http://notification-service:3000
    networks:
      - internal
    depends_on:
      - ticket-mongo
      - event-service
      - user-profile-service
      - notification-service

  notification-service:
    build:
      context: ./notification-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://notification-mongo:27017/notification-db
      - USER_PROFILE_SERVICE_URL=http://user-profile-service:3000
    networks:
      - internal
    depends_on:
      - notification-mongo
      - user-profile-service

  user-profile-service:
    build:
      context: ./user-profile-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://userprofile-mongo:27017/userprofile-db
    networks:
      - internal
    depends_on:
      - userprofile-mongo

  # ── İzleme / Monitoring ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - internal
    depends_on:
      - dispatcher

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - internal

  # ── Veritabanı UI Araçları ────────────────────────────────────────────────
  event-mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://event-mongo:27017/event-db
      ME_CONFIG_BASICAUTH: false
    networks:
      - internal
    depends_on:
      - event-mongo

  ticket-mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://ticket-mongo:27017/ticket-db
      ME_CONFIG_BASICAUTH: false
    networks:
      - internal
    depends_on:
      - ticket-mongo

  notification-mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8084:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://notification-mongo:27017/notification-db
      ME_CONFIG_BASICAUTH: false
    networks:
      - internal
    depends_on:
      - notification-mongo

  userprofile-mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8085:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://userprofile-mongo:27017/userprofile-db
      ME_CONFIG_BASICAUTH: false
    networks:
      - internal
    depends_on:
      - userprofile-mongo

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: always
    environment:
      - REDIS_HOSTS=auth-redis:redis:6379,dispatcher-redis:dispatcher-redis:6379
    ports:
      - "8083:8081"
    networks:
      - internal
    depends_on:
      - redis
      - dispatcher-redis

networks:
  internal:
    driver: bridge

volumes:
  event_mongo_data:
  ticket_mongo_data:
  notification_mongo_data:
  userprofile_mongo_data:
